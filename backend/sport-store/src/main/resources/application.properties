spring.application.name=sport-store

# =========================================================
# SERVER CONFIG
# =========================================================

server.port=8080

# =========================================================
# APPLICATION NAME
# =========================================================

# =========================================================
# SQL SERVER DATABASE CONFIG
# =========================================================

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SportShopDB;encrypt=true;trustServerCertificate=true


spring.datasource.username=sa
spring.datasource.password=123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================================================
# JPA / HIBERNATE CONFIG
# =========================================================

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# =========================================================
# FILE UPLOAD CONFIG
# =========================================================

spring.servlet.multipart.enabled=true

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

upload.path=uploads/

# =========================================================
# JWT CONFIG
# =========================================================

# =========================================================
# SWAGGER / OPENAPI CONFIG
# =========================================================

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.path=/api-docs

# =========================================================
# UTF-8 CONFIG
# =========================================================

server.servlet.encoding.charset=UTF-8

server.servlet.encoding.enabled=true

server.servlet.encoding.force=true

gemini.api.key=${GEMINI_API_KEY}
groq.api.key=${GROQ_API_KEY}
# =========================================================
# LOGGING CONFIG
# =========================================================

logging.level.org.springframework.security=DEBUG

logging.level.org.hibernate.SQL=DEBUG

# =========================================================
# VNPAY CONFIG
# =========================================================

vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}

vnpay.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

vnpay.returnUrl=http://localhost:5173/payment-result

# =========================================================
# EMAIL CONFIG (AI REMINDER / OTP / NOTIFICATION)
# =========================================================

spring.mail.host=smtp.gmail.com

spring.mail.port=587

spring.mail.username=your_email@gmail.com

spring.mail.password=your_app_password

spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================================
# JACKSON JSON CONFIG
# =========================================================

spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# =========================================================
# STATIC RESOURCE CONFIG
# =========================================================

spring.web.resources.static-locations=classpath:/static/,file:uploads/

# =========================================================
# DEVTOOLS
# =========================================================

spring.devtools.restart.enabled=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl